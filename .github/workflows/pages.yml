name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: gh-pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          A51B7D: ${{ secrets.A51B7D }}
          B0A430: ${{ secrets.B0A430 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('A51B7D', '')
          tag_b = os.environ.get('B0A430', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 83f31c1a6ce10f5f128987b3174a3464faed7a -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- 88cd76479be541a1439bb076e5507a746f -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
